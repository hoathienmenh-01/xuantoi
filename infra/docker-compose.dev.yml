version: "3.9"

services:
  pg:
    image: postgres:16-alpine
    container_name: xuantoi-pg
    environment:
      POSTGRES_USER: mtt
      POSTGRES_PASSWORD: mtt
      POSTGRES_DB: mtt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtt -d mtt"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: xuantoi-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: quay.io/minio/minio
    container_name: xuantoi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data

  mailhog:
    image: mailhog/mailhog
    container_name: xuantoi-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata: {}
  minio: {}
