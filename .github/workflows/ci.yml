name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mtt
          POSTGRES_PASSWORD: mtt
          POSTGRES_DB: mtt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mtt -d mtt"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://mtt:mtt@localhost:5432/mtt?schema=public
      TEST_DATABASE_URL: postgresql://mtt:mtt@localhost:5432/mtt?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm prisma:generate

      - name: Apply migrations (Postgres service)
        working-directory: apps/api
        run: pnpm exec prisma migrate deploy

      - name: Build shared (needed for downstream typecheck/lint/test)
        run: pnpm --filter @xuantoi/shared build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (shared + api)
        run: pnpm test

      - name: Build
        run: pnpm build
